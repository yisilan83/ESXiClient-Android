name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK for clarity
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ESXiClient-v1.0.1-NewUI.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESXiClient-v1.0.1-NewUI
        path: app/build/outputs/apk/debug/ESXiClient-v1.0.1-NewUI.apk